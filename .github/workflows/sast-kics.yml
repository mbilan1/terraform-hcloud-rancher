name: "SAST: KICS"

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  kics:
    name: KICS scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run KICS
        uses: Checkmarx/kics-github-action@v2.1.20
        with:
          path: .
          type: Terraform
          fail_on: high
          output_formats: json
          # e38a8e0a: "Variable without type" — OpenTofu check{} blocks confuse KICS parser
          # a88baa34: "Generic Password" — false positive on admin_password = local.effective_admin_password (reference, not literal)
          exclude_queries: "e38a8e0a-b88b-4902-b3fe-b0571e3c97ec,a88baa34-e2ad-44ea-ad6f-8cac87bc7c71"
