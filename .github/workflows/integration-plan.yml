name: "Integration: plan"

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plan:
    name: tofu plan (examples/minimal)
    runs-on: ubuntu-latest
    if: vars.HAS_CLOUD_CREDENTIALS == 'true'
    defaults:
      run:
        working-directory: examples/minimal
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
      - run: tofu init
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      - run: tofu plan -no-color -input=false
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_hcloud_api_token: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_admin_password: "ci-plan-placeholder-pw1!"
